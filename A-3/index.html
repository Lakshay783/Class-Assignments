<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <nav>
        <div class="nl"><img style="width: 80px;" src="assets/logo.png" alt=""></div>
        <div class="nc"><a href="">About</a><a href="">Watch now</a><a href="">Actors</a></div>
        <div class="nr"><i style="font-size: 30px; color: white;" class="ri-filter-3-fill"></i></div>
    </nav>
    <div class="box1">
        <div class="lb1">
            <img src="assets/logo2.png" alt="">
            <p>Action / Thriller / Drama Series directed by Dong-hyuk Hwang <br> Season 1: 9 Episodes</p>
            <div class="btns">
                <button class="play">
                    <i class="ri-play-circle-fill"></i>
                    Play Now
                </button>

                <button class="watch">
                    <i class="ri-play-mini-line"></i>
                    Watch Trailer
                </button>
            </div>
        </div>
        <div class="rb1"><img src="assets/guard.png" alt=""></div>
    </div>
    <div class="box2">
        <div class="holder">
            <div class="card"><img src="assets/tile_1.jpg" alt=""><button><i class="ri-play-fill"></i></button></div>
            <div class="card"><img src="assets/tile_2.webp" alt=""><button><i class="ri-play-fill"></i></button></div>
            <div class="card"><img src="assets/tile_3.jpg" alt=""><button><i class="ri-play-fill"></i></button></div>
        </div>
    </div>
</body>

</html>
