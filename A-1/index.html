<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon"
        href="https://imgs.search.brave.com/cutnYZmO1TrqCZ4bWkGJXn6Aq6rWpIbquj6JkKXDGGo/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly90aHVt/Ym5haWwuaW1nYmlu/LmNvbS8zLzEyLzkv/cGlrYWNodS1waWth/Y2h1LWNhcnRvb24t/aWxsdXN0cmF0aW9u/LWhuUkMxUnI0X3Qu/anBn"
        type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <div class="base">
        <nav>
            <div class="header">
                <div class="left">
                    <p><i class="ri-menu-line"></i></p>
                    <div class="search-box">
                        <i class="ri-search-line"></i>
                        <input type="text" placeholder="Search for a pokemon...">
                    </div>
                </div>
                <div class="center">
                    <img src="https://in.portal-pokemon.com/public_assets/images/logo.png" alt="">
                </div>
                <div class="right">
                    <p><i class="ri-sun-line"></i></p>
                    <div class="filter-section">
                        <div class="filter-box">
                            <select>
                                <option selected disabled>
                                    Filter by types (1)
                                </option>
                            </select>
                        </div>
                        <p><i class="ri-filter-3-line"></i></p>
                    </div>
                </div>
            </div>
        </nav>
        <div class="content">
            <div class="card">
                <div class="info">
                    <p>#0908</p>
                    <i class="ri-heart-line"></i>
                </div>
                <figure>
                    <img src="https://in.portal-pokemon.com/play/resources/pokedex/img/pm/7ec8bac5e4b4c903ae179e3fc4217e19f617edfe.png"
                        alt="">
                    <figcaption>Meowscarada</figcaption>
                </figure>
                <div class="decription">
                    <p class="ability">GRASS</p>
                    <i class="ri-arrow-right-long-line"></i>
                </div>
            </div>
            <div class="card">
                <div class="info">
                    <p>#0624</p>
                    <i class="ri-heart-line"></i>
                </div>
                <figure>
                    <img src="https://in.portal-pokemon.com/play/resources/pokedex/img/pm/d91d960991e5b1607aba9bc2c791851654582ada.png"
                        alt="">
                    <figcaption>Pawniard</figcaption>
                </figure>
                <div class="decription">
                    <p class="ability">DARK/STEEL</p>
                    <i class="ri-arrow-right-long-line"></i>
                </div>
            </div>
            <div class="card">
                <div class="info">
                    <p>#0229</p>
                    <i class="ri-heart-line"></i>
                </div>
                <figure>
                    <img src="https://in.portal-pokemon.com/play/resources/pokedex/img/pm/13586581e62759dc41f668168c9f51c9a75c9356.png"
                        alt="">
                    <figcaption>Houndoom</figcaption>
                </figure>
                <div class="decription">
                    <p class="ability">DARK/FIRE</p>
                    <i class="ri-arrow-right-long-line"></i>
                </div>
            </div>
            <div class="card">
                <div class="info">
                    <p>#0686</p>
                    <i class="ri-heart-line"></i>
                </div>
                <figure>
                    <img src="https://in.portal-pokemon.com/play/resources/pokedex/img/pm/f3480489a6ad7ff98fbd0708ecf9b97cbe5f9b24.png"
                        alt="">
                    <figcaption>Inkay</figcaption>
                </figure>
                <div class="decription">
                    <p class="ability">DARK/PSYCHIC</p>
                    <i class="ri-arrow-right-long-line"></i>
                </div>
            </div>
        </div>
        <div class="stats">
            <div class="more">
                <img src="img/pokeball.png" alt="">
                <p><strong>Explore</strong><br>Discover all your favourate Pokemon</p>
            </div>
            <div class="more">
                <img src="img/leaf.png" alt="">
                <p><strong>Filter</strong><br>Find Pokemon by types and abilities</p>
            </div>
            <div class="more">
                <img src="img/star.png" alt="">
                <p><strong>Collection</strong><br>Save and manage your collection</p>
            </div>
            <div class="more">
                <img src="img/stats.png" alt="">
                <p><strong>Stats</strong><br>View stats and learn about Pokemon</p>
            </div>
        </div>
        <footer>
            <img width="25px" src="img/Pokemon.png" alt="">
            <p><span><i class="ri-copyright-line"></i></span>2026 Pokemon, All rights reserved.</p>
        </footer>
    </div>
</body>

</html>
